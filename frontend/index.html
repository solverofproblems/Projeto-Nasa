<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroLens | Explore o Cosmos</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="/logo.png" alt="AstroLens Logo" class="logo-img">
            <span class="logo-text">AstroLens</span>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Sua Janela para o Universo</h1>
            <p>Descubra o que a NASA capturou no dia que mudou sua história.</p>
        </section>

        <section class="search-box">
            <label for="data_nascimento">Escolha uma Data</label>
            <input id="data_nascimento" type="date" required>
            <button id="btnSend">Explorar o Cosmo</button>
        </section>

        <section id="campo_resultado">
            <!-- Os resultados serão injetados aqui via JS -->
        </section>
    </main>

    <footer>
        <p>&copy; 2026 AstroLens. Dados fornecidos pela NASA APOD API.</p>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
